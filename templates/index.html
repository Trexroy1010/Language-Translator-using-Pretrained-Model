<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@500;600&family=Manrope:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="page">
    <section class="card">
      <div class="card-top">
        <div>
          <p class="eyebrow">NLLB-200 &middot; {{ languages|length }} languages</p>
          <h1>Translator</h1>
        </div>
        <button class="history-btn" id="historyBtn" type="button" aria-label="View translation history">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </button>
      </div>

      <hr class="divider" />

      <div class="lang-row">
        <div class="lang-field">
          <label for="fromLang">From</label>
          <select id="fromLang" class="lang-select">
            <option value="auto" selected>Detect language</option>
            {% for lang in languages %}
            <option value="{{ lang.code }}">{{ lang.name }} &middot; {{ lang.native }}</option>
            {% endfor %}
          </select>
        </div>

        <button class="swap-btn" id="swapBtn" type="button" aria-label="Swap languages">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>

        <div class="lang-field">
          <label for="toLang">To</label>
          <select id="toLang" class="lang-select">
            {% for lang in languages %}
            <option value="{{ lang.code }}" {% if lang.code == 'eng_Latn' %}selected{% endif %}>{{ lang.name }} &middot; {{ lang.native }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="text-panes">
        <div class="pane">
          <textarea
            id="inputText"
            class="pane-input"
            placeholder="Type or paste text here&hellip;"
            maxlength="2000"
          ></textarea>
          <div class="pane-footer">
            <span class="char-count" id="charCount">0 / 2000</span>
          </div>
        </div>

        <div class="pane">
          <div class="pane-output placeholder" id="outputText">Translation will appear here.</div>
          <div class="pane-footer">
            <span class="detected-tag" id="detectedTag"></span>
            <button class="copy-btn" id="copyBtn" type="button" style="margin-left: auto;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copy
            </button>
          </div>
        </div>
      </div>

      <div class="action-row">
        <button class="translate-btn" id="translateBtn" type="button">
          <span id="translateBtnLabel">Translate</span>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
        <p class="hint">Ctrl + Enter to translate</p>
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </section>
  </main>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer" aria-label="Translation history">
    <div class="drawer-header">
      <h2>History</h2>
      <button class="drawer-close" id="drawerClose" type="button" aria-label="Close history">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="drawer-list" id="drawerList">
      <p class="drawer-empty">No translations yet.</p>
    </div>
    <div class="drawer-footer">
      <button class="clear-history" id="clearHistory" type="button">Clear all history</button>
    </div>
  </aside>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
